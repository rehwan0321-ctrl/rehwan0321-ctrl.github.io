<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RW Investimentos Financeiros</title>
  <script>
    var l = window.location;
    var pathname = l.pathname;
    var search = l.search;
    var hash = l.hash;
    // Redirect to controle-financeiro base path
    var newUrl = l.protocol + "//" + l.hostname + "/controle-financeiro" + pathname + search + hash;
    l.replace(newUrl);
  </script>
</head>

</html>
